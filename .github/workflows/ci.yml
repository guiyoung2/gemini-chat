name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 의존성 설치
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: 타입 체크
        run: npx tsc --noEmit

      - name: 테스트
        run: npm test

      - name: 빌드
        run: npm run build
